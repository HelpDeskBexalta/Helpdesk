<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Recuperar contraseña</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #dfe9ff, #f5f8ff);
      font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-reset {
      max-width: 420px;
      width: 100%;
      margin: 20px;
      background: #fff;
      padding: 30px;
      border-radius: 14px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      border: 1px solid #e5e7eb;
    }

    .brand-icon {
      font-size: 42px;
      color: #0d6efd;
    }

    .form-floating > label {
      left: 12px;
    }

    .password-requirements {
      font-size: 0.8rem;
      color: #6c757d;
    }

    .password-requirements li {
      margin-bottom: 4px;
    }

    .password-requirements .valid {
      color: #198754;
    }

    .password-requirements .invalid {
      color: #dc3545;
    }
  </style>
</head>

<body>

<div class="card-reset">
  <div class="text-center mb-3">
    <i class="bi bi-shield-lock brand-icon"></i>
  </div>

  <h4 class="text-center mb-3">Restablecer contraseña</h4>

  <p class="text-muted small mb-4 text-center">
    Ingresa tu nueva contraseña. Debe cumplir con los requisitos de seguridad.
  </p>

  <div class="form-floating mb-3">
    <input type="password" id="newPass1" class="form-control" placeholder="Nueva contraseña" oninput="validatePassword()">
    <label for="newPass1">Nueva contraseña</label>
  </div>

  <div class="form-floating mb-3">
    <input type="password" id="newPass2" class="form-control" placeholder="Repetir contraseña" oninput="validatePassword()">
    <label for="newPass2">Repetir contraseña</label>
  </div>

  <ul class="password-requirements mb-3">
    <li id="req-length" class="invalid"><i class="bi bi-x-circle me-1"></i> Mínimo 8 caracteres</li>
    <li id="req-upper" class="invalid"><i class="bi bi-x-circle me-1"></i> Al menos una mayúscula</li>
    <li id="req-lower" class="invalid"><i class="bi bi-x-circle me-1"></i> Al menos una minúscula</li>
    <li id="req-number" class="invalid"><i class="bi bi-x-circle me-1"></i> Al menos un número</li>
    <li id="req-match" class="invalid"><i class="bi bi-x-circle me-1"></i> Las contraseñas coinciden</li>
  </ul>

  <div id="resetMsg" class="small text-center mb-3 d-none"></div>

  <button id="btnSubmit" class="btn btn-primary w-100" onclick="submitNewPassword()" disabled>
    <i class="bi bi-check-circle me-1"></i> Guardar nueva contraseña
  </button>

  <div class="text-center mt-3">
    <a href="#" onclick="window.close()" class="text-muted small">Cerrar ventana</a>
  </div>
</div>

<script>
  const TOKEN = "<?= token ?>";

  function validatePassword() {
    const p1 = document.getElementById('newPass1').value;
    const p2 = document.getElementById('newPass2').value;

    const checks = {
      length: p1.length >= 8,
      upper: /[A-Z]/.test(p1),
      lower: /[a-z]/.test(p1),
      number: /[0-9]/.test(p1),
      match: p1 === p2 && p1.length > 0
    };

    updateRequirement('req-length', checks.length);
    updateRequirement('req-upper', checks.upper);
    updateRequirement('req-lower', checks.lower);
    updateRequirement('req-number', checks.number);
    updateRequirement('req-match', checks.match);

    const allValid = Object.values(checks).every(v => v);
    document.getElementById('btnSubmit').disabled = !allValid;

    return allValid;
  }

  function updateRequirement(id, valid) {
    const el = document.getElementById(id);
    el.classList.toggle('valid', valid);
    el.classList.toggle('invalid', !valid);
    const icon = el.querySelector('i');
    icon.className = valid ? 'bi bi-check-circle me-1' : 'bi bi-x-circle me-1';
  }

  function submitNewPassword() {
    if (!validatePassword()) return;

    const p1 = document.getElementById('newPass1').value.trim();
    const msg = document.getElementById('resetMsg');

    msg.classList.add('d-none');
    document.getElementById('btnSubmit').disabled = true;
    document.getElementById('btnSubmit').innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> Guardando...';

    google.script.run
      .withSuccessHandler(() => {
        msg.textContent = '✅ Contraseña actualizada correctamente. Ya puedes cerrar esta ventana e iniciar sesión.';
        msg.className = 'small text-success mb-3 text-center';
        msg.classList.remove('d-none');
        document.getElementById('btnSubmit').innerHTML = '<i class="bi bi-check-circle me-1"></i> Guardado';
      }).withFailureHandler(err => {
        msg.textContent = err.message || 'Error al actualizar la contraseña.';
        msg.className = 'small text-danger mb-3 text-center';
        msg.classList.remove('d-none');
        document.getElementById('btnSubmit').disabled = false;
        document.getElementById('btnSubmit').innerHTML = '<i class="bi bi-check-circle me-1"></i> Guardar nueva contraseña';
      }).resetPasswordConfirm(TOKEN, p1);
  }

  // Validar al cargar (por si hay autocompletado)
  document.addEventListener('DOMContentLoaded', validatePassword);
</script>

</body>
</html>
